# Persist the local stores under /var/lib/lore instead of a temporary
# directory (the upstream default derives <tmpdir>/lore-server, which is
# wiped on reboot). The lock store runs in-memory and needs no path.
[immutable_store.local]
path = "/var/lib/lore/immutable"

[mutable_store.local]
path = "/var/lib/lore/mutable"
