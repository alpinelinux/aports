# See chrony.conf(5) for more information about usable directives.

# Include configuration files with the ".conf" suffic from /etc/chrony/conf.d.
confdir /etc/chrony/conf.d

# Use four public NTP servers from the pool.ntp.org project. If this
# host has a static public IP address, please consider joining the pool:
# https://www.ntppool.org/join.html
pool pool.ntp.org iburst

# Include configuration files with the ".source" suffix from
# /etc/chrony/sources.d. They can only contain the "peer", "pool" and "server"
# directives and must have all lines terminated by a newline.
sourcedir /etc/chrony/sources.d

# Specify file containing keys for NTP authentication.
# keyfile /etc/chrony/chrony.keys

# Record the rate at which the system clock gains/losses time.
driftfile /var/lib/chrony/chrony.drift

# Save NTS keys and cookies.
ntsdumpdir /var/lib/chrony

# Uncomment the following line to turn logging on.
# log measurements statistics tracking

# Specify directory for log files.
logdir /var/log/chrony

# Stop bad estimates upsetting machine clock.
maxupdateskew 100.0

# Enable kernel synchronisation (every 11 minutes) of the real-time clock.
# Note that it can't be used along with the 'rtcfile' directive.
rtcsync

# Step the system clock instead of slewing it if the adjustment is larger than
# one second, but only in the first three clock updates.
makestep 1.0 3

# Disable UDP command port - no remote chronyc access and no UDP access for
# unprivileged users; control remains available via the Unix socket.
cmdport 0
